<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Favicon Files -->

  <link rel="shortcut icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/site.webmanifest"/>
  <style>
    body {
      padding-top: 56px; /* Adjust padding to match navbar height */
    }
    /* Optional: Add some styles for better visualization */
    .alive-yes {
      color: green;
      font-weight: bold;
    }
    .alive-no {
      color: red;
      font-weight: bold;
    }
    .reachable-yes {
      color: green;
      font-weight: bold;
    }
    .reachable-no {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="/static/ScotsPinelogo-medium.png" alt="ScotsPine Logo" style="height: 40px; margin-right: 10px;"/>
      PLC Sync Server
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" 
            data-target="#navbarNav" aria-controls="navbarNav" 
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- Left-side links -->
      <ul class="navbar-nav mr-auto">
        <li class="nav-item active">
          <a class="nav-link" href="/gui"><u>Home</u></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/setup">Setup</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/fields">Field Manager</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/manual">Manual</a>
        </li>

      </ul>
      <!-- Right-side: Logout link -->
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <a class="nav-link" href="/logout">Logout</a>

      </ul>

</nav>

  <div class="container">
    <!--<h1 class="mt-5">PLC Sync Server Management</h1>-->


        <!-- PLC Status Section -->
        <div class="card mt-4">
          <div class="card-body">
            <h2>PLC Status</h2>
            <!-- Removed the Refresh Status button -->
            <ul id="plc-status-list" class="list-group"></ul>
          </div>
        </div>


    <!-- Combined Data View -->
    <div class="card mt-4">
      <div class="card-body">
        <h2>Combined PLC Data</h2>
        <div class="d-flex align-items-center">
          <button id="refresh-data" class="btn btn-secondary mb-3">Refresh Data</button>
          <div class="form-check form-switch ml-3">
            <input class="form-check-input" type="checkbox" id="auto-refresh-toggle">
            <label class="form-check-label" for="auto-refresh-toggle">Auto Refresh</label>
          </div>
        </div>
        <pre id="combined-data" class="bg-light p-3 border" style="height: 300px; overflow-y: scroll;"></pre>
      </div>
    </div>


    <!-- Individual PLC Data Manipulation -->
    <div class="card mt-4">
      <div class="card-body">
        <h2>Individual PLC Control</h2>
        <select id="plc-select" class="form-control mb-3">
          <option value="" disabled selected>Select a PLC</option>
          <!-- Options will be dynamically loaded -->
        </select>
        <textarea id="plc-data-editor" class="form-control mb-3" rows="10" placeholder="Edit PLC data here..."></textarea>
        <button id="write-plc-data" class="btn btn-success">Write PLC Data</button>
        <span id="write-status" style="margin-left: 10px;"></span>
      </div>
    </div>


  </div>



  <!-- Bootstrap JavaScript -->
  <!-- jQuery (required for Bootstrap 4) -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <!-- Popper.js (required for Bootstrap 4) -->
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <!-- Bootstrap 4 JavaScript -->
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <script>
    

    // Load Combined Data
    function loadCombinedData() {
      fetch('/data')
        .then(response => response.json())
        .then(data => {
          document.getElementById('combined-data').textContent = JSON.stringify(data.combinedData, null, 2);
        })
        .catch(error => {
          console.error('Error loading combined data:', error);
        });
    }

    // Refresh Combined Data
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('refresh-data').addEventListener('click', function () {
        loadCombinedData();
      });

      let autoRefreshInterval;
      document.getElementById('auto-refresh-toggle').addEventListener('change', function () {
        if (this.checked) {
          autoRefreshInterval = setInterval(loadCombinedData, 500); // Refresh every 1 second
          console.log('Auto Refresh Enabled');
        } else {
          clearInterval(autoRefreshInterval);
          console.log('Auto Refresh Disabled');
        }
      });
    });

    // Load PLC List
    function loadPLCList() {
      fetch('/config')
        .then(response => response.json())
        .then(config => {
          const plcSelect = document.getElementById('plc-select');
          plcSelect.innerHTML = '<option value="" disabled selected>Select a PLC</option>'; // Reset options
          config.plcs.forEach(plc => {
            const option = document.createElement('option');
            option.value = plc.name;
            option.textContent = plc.name;
            plcSelect.appendChild(option);
          });
        })
        .catch(error => {
          console.error('Error loading PLC list:', error);
        });
    }

    // Load Individual PLC Data
    document.getElementById('plc-select').addEventListener('change', function () {
      const plcName = this.value;

      fetch(`/plc/${encodeURIComponent(plcName)}`)
        .then(response => {
          if (!response.ok) {
            throw new Error(`PLC ${plcName} not found.`);
          }
          return response.json();
        })
        .then(data => {
          document.getElementById('plc-data-editor').value = JSON.stringify(data, null, 2);
        })
        .catch(error => {
          document.getElementById('plc-data-editor').value = '';
          console.error('Error loading PLC data:', error);
          alert(error.message);
        });
    });

    // Write Individual PLC Data
    document.getElementById('write-plc-data').addEventListener('click', function () {
      const plcName = document.getElementById('plc-select').value;
      const plcDataContent = document.getElementById('plc-data-editor').value;

      if (!plcName) {
        alert('Please select a PLC to write data.');
        return;
      }

      try {
        const plcData = JSON.parse(plcDataContent);
        fetch(`/plc/${encodeURIComponent(plcName)}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(plcData) // Ensure valid JSON is sent
        })
        .then(response => {
          if (!response.ok) {
            return response.text().then(text => { throw new Error(text) });
          }
          return response.text();
        })
        .then(message => {
          document.getElementById('write-status').textContent = message;
        })
        .catch(error => {
          document.getElementById('write-status').textContent = 'Failed to write PLC data.';
          console.error('Write error:', error);
        });
      } catch (e) {
        document.getElementById('write-status').textContent = 'Invalid JSON format.';
        console.error('Invalid JSON:', e);
      }
    });


    // Load PLC Status
    function loadPLCStatus() {
  fetch('/status')
    .then(response => response.json())
    .then(data => {
      const statusList = document.getElementById('plc-status-list');
      statusList.innerHTML = ''; // Clear previous statuses

      const plcStatus = data.plcStatus;
      for (const plcName in plcStatus) {
        const status = plcStatus[plcName];
        const listItem = document.createElement('li');
        listItem.className = 'list-group-item d-flex justify-content-between align-items-center';

        const nameSpan = document.createElement('span');
        nameSpan.innerHTML = `<strong>${plcName}</strong>`;

        const statusSpan = document.createElement('span');

        // Create Reachable Badge with white text
        const reachableBadge = document.createElement('span');
        reachableBadge.className = `badge badge-${status.reachable ? 'success' : 'danger'} mr-2`;
        reachableBadge.textContent = status.reachable ? 'Reachable: Yes' : 'Reachable: No';
        reachableBadge.style.color = '#fff';  // Set text color to white

        // Create Alive Badge with white text
        const aliveBadge = document.createElement('span');
        aliveBadge.className = `badge badge-${status.alive ? 'success' : 'danger'}`;
        aliveBadge.textContent = status.alive ? 'Alive: Yes' : 'Alive: No';
        aliveBadge.style.color = '#fff';  // Set text color to white
        
// Reachable not working properly yet, so we leave it out for the moment
        statusSpan.appendChild(reachableBadge);
        statusSpan.appendChild(aliveBadge);

        listItem.appendChild(nameSpan);
        listItem.appendChild(statusSpan);

        statusList.appendChild(listItem);
      }
    })
    .catch(error => {
      console.error('Error loading PLC status:', error);
    });
}


    // Auto-update PLC Status every second
    setInterval(loadPLCStatus, 1000); // Refresh every 1 second

    // Initial Load
    document.addEventListener('DOMContentLoaded', function () {
      loadCombinedData();
      loadPLCList();
      loadPLCStatus(); // Initial load
    });
  </script>

</body>
</html>
